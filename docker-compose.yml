services:
  postgres:
    image: postgres:16-alpine
    container_name: skm-energo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skm
      POSTGRES_PASSWORD: skm
      POSTGRES_DB: skm_energo
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skm -d skm_energo']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
